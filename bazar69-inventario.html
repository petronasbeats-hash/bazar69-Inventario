<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bazar 69 · Panel</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: #F7F2E7;
  background-image: radial-gradient(circle at 1px 1px, rgba(42,33,24,0.05) 1px, transparent 0);
  background-size: 18px 18px;
  font-family: 'Inter', sans-serif;
  color: #2A2118;
  padding: 18px 14px 60px;
}
.wrap { max-width: 480px; margin: 0 auto; }
.header { text-align: center; margin-bottom: 14px; position: relative; }
.eyebrow {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
  color: #8A7A5E; margin-bottom: 4px;
}
.title { font-family: 'Fraunces', serif; font-weight: 700; font-size: 28px; }

.lock-bar {
  display: flex; justify-content: center; align-items: center; gap: 8px;
  margin: 10px 0 16px;
}
.lock-btn {
  font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
  padding: 7px 12px; border-radius: 999px; cursor: pointer; border: 1.3px solid #2A2118;
  background: transparent; display: flex; align-items: center; gap: 5px;
}
.lock-btn.unlocked { background: #2A2118; color: #F7F2E7; }

.nav-tabs { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 16px; padding-bottom: 2px; }
.nav-tab {
  font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 9px 14px;
  border-radius: 999px; border: 1.5px solid #2A2118; background: transparent;
  color: #2A2118; white-space: nowrap; cursor: pointer;
}
.nav-tab.active { background: #C98A2C; border-color: #C98A2C; }

.section { display: none; }
.section.active { display: block; }

.totals {
  background: #2A2118; color: #F7F2E7; border-radius: 14px;
  padding: 16px 18px; margin-bottom: 16px; position: relative; overflow: hidden;
}
.totals::before {
  content: ''; position: absolute; top: -20px; right: -20px;
  width: 90px; height: 90px; border-radius: 50%; background: rgba(201,138,44,0.18);
}
.totals-label {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.1em;
  text-transform: uppercase; color: #C98A2C;
}
.totals-value { font-family: 'Fraunces', serif; font-size: 34px; font-weight: 600; margin: 2px 0 10px; }
.totals-split { display: flex; gap: 18px; font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; }
.dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }

.tabs { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 14px; padding-bottom: 2px; }
.tab {
  font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 8px 14px;
  border-radius: 999px; border: 1.5px solid #2A2118; background: transparent;
  color: #2A2118; white-space: nowrap; cursor: pointer;
}
.tab.active { background: #2A2118; color: #F7F2E7; }

.add-btn {
  width: 100%; padding: 13px; border-radius: 12px; border: none;
  background: #C98A2C; color: #2A2118; font-family: 'IBM Plex Mono', monospace;
  font-weight: 700; font-size: 14px; letter-spacing: 0.02em; cursor: pointer; margin-bottom: 16px;
}
.add-btn.ghost-locked {
  background: transparent; border: 1.5px dashed #C9A87C; color: #8A7A5E;
}
.form-card {
  background: #FFFDF8; border: 1.5px dashed #C9A87C; border-radius: 14px;
  padding: 16px; margin-bottom: 18px; display: none;
}
.form-card.open { display: block; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; color: #6B5D46; }
.field input, .field textarea {
  width: 100%; padding: 10px 12px; border-radius: 9px; border: 1.5px solid #D9C7A3;
  background: #fff; font-size: 15px; font-family: 'Inter', sans-serif;
}
.field textarea { resize: vertical; min-height: 70px; }
.owner-pick { display: flex; gap: 8px; }
.owner-opt {
  flex: 1; padding: 10px; text-align: center; border-radius: 9px;
  border: 1.5px solid #D9C7A3; cursor: pointer; font-size: 13px; font-weight: 600;
}
.owner-opt.sel-mayra { background: #F6E4EA; border-color: #C1587A; color: #8C3F5A; }
.owner-opt.sel-papa { background: #E3EEEC; border-color: #2E6B63; color: #204F49; }
.form-actions { display: flex; gap: 8px; margin-top: 6px; }
.btn-primary, .btn-ghost {
  flex: 1; padding: 11px; border-radius: 9px; font-family: 'IBM Plex Mono', monospace;
  font-size: 13px; font-weight: 600; cursor: pointer; border: none;
}
.btn-primary { background: #2A2118; color: #F7F2E7; }
.btn-primary:disabled { opacity: 0.4; }
.btn-ghost { background: transparent; border: 1.5px solid #2A2118; color: #2A2118; }

.card {
  position: relative; background: #FFFDF8; border-radius: 4px 14px 14px 4px;
  padding: 14px 14px 14px 20px; margin-bottom: 10px;
  box-shadow: 0 1px 0 rgba(42,33,24,0.06); border: 1px solid #EAE0C9; overflow: hidden;
}
.card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px; }
.card.mayra::before { background: #C1587A; }
.card.papa::before { background: #2E6B63; }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.code { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 15px; letter-spacing: 0.02em; }
.owner-tag {
  font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; padding: 3px 8px;
  border-radius: 999px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
}
.name { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 600; margin: 4px 0 2px; }
.price-row { display: flex; justify-content: space-between; align-items: baseline; margin-top: 8px; }
.price { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 700; color: #C98A2C; }
.price.sold { color: #A63D2F; }
.meta { font-size: 11.5px; color: #8A7A5E; }
.actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
.mini-btn {
  font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; padding: 7px 10px;
  border-radius: 7px; border: 1.3px solid #2A2118; background: transparent; cursor: pointer;
}
.mini-btn.danger { border-color: #A63D2F; color: #A63D2F; }
.mini-btn.solid { background: #2A2118; color: #F7F2E7; }
.stamp {
  position: absolute; right: 10px; top: 14px; font-family: 'IBM Plex Mono', monospace;
  font-weight: 700; font-size: 12px; color: #A63D2F; border: 2px solid #A63D2F;
  border-radius: 6px; padding: 3px 8px; transform: rotate(-9deg); opacity: 0.85;
}
.inline-form {
  margin-top: 10px; background: #F7F2E7; border-radius: 9px; padding: 10px;
  display: none; gap: 8px; align-items: center;
}
.inline-form.open { display: flex; }
.inline-form input {
  flex: 1; padding: 8px 10px; border-radius: 7px; border: 1.5px solid #D9C7A3;
  font-family: 'IBM Plex Mono', monospace; font-size: 14px;
}
.empty { text-align: center; padding: 30px 16px; color: #8A7A5E; font-size: 13.5px; }
.error-banner { background: #FBE4E0; color: #A63D2F; padding: 10px 14px; border-radius: 9px; font-size: 12.5px; margin-bottom: 12px; display: none; }
.error-banner.show { display: block; }
.saving-tag { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #C98A2C; text-align: center; margin-bottom: 8px; display: none; }
.saving-tag.show { display: block; }
.footer-note { text-align: center; font-size: 11.5px; color: #8A7A5E; margin-top: 24px; line-height: 1.6; }

/* Bitacora */
.horario-card {
  background: #FFFDF8; border: 1px solid #EAE0C9; border-radius: 14px;
  padding: 16px; margin-bottom: 16px; text-align: center;
}
.horario-fijo { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #6B5D46; margin-bottom: 4px; }
.horario-fijo strong { color: #2A2118; }
.status-pill {
  display: inline-block; margin-top: 10px; padding: 6px 14px; border-radius: 999px;
  font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 700;
}
.status-abierto { background: #E3EEEC; color: #204F49; }
.status-cerrado { background: #FBE4E0; color: #A63D2F; }
.bitacora-actions { display: flex; gap: 8px; margin-top: 14px; }
.bitacora-actions button {
  flex: 1; padding: 12px; border-radius: 10px; border: none;
  font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 13px; cursor: pointer;
}
.btn-abrir { background: #2E6B63; color: #fff; }
.btn-cerrar { background: #A63D2F; color: #fff; }
.log-row {
  display: flex; justify-content: space-between; align-items: center;
  background: #FFFDF8; border: 1px solid #EAE0C9; border-radius: 10px;
  padding: 10px 14px; margin-bottom: 8px; font-size: 13px;
}
.log-date { font-family: 'Fraunces', serif; font-weight: 600; }
.log-times { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #6B5D46; }

/* Chat */
.whoami { display: flex; gap: 8px; margin-bottom: 14px; }
.who-opt {
  flex: 1; padding: 10px; text-align: center; border-radius: 9px;
  border: 1.5px solid #D9C7A3; cursor: pointer; font-size: 13px; font-weight: 600;
}
.who-opt.sel { background: #2A2118; color: #F7F2E7; border-color: #2A2118; }
.chat-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.msg {
  max-width: 82%; padding: 10px 13px; border-radius: 12px; background: #FFFDF8;
  border: 1px solid #EAE0C9; font-size: 14px;
}
.msg.own { align-self: flex-end; background: #C98A2C; border-color: #C98A2C; color: #2A2118; }
.msg-author { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; font-weight: 700; text-transform: uppercase; opacity: 0.7; margin-bottom: 3px; }
.msg-time { font-family: 'IBM Plex Mono', monospace; font-size: 9.5px; opacity: 0.55; margin-top: 4px; }
.chat-input-row { display: flex; gap: 8px; position: sticky; bottom: 10px; }
.chat-input-row input {
  flex: 1; padding: 12px 14px; border-radius: 999px; border: 1.5px solid #D9C7A3; font-size: 14px;
}
.chat-send {
  padding: 12px 18px; border-radius: 999px; border: none; background: #2A2118;
  color: #F7F2E7; font-family: 'IBM Plex Mono', monospace; font-weight: 700; cursor: pointer;
}

/* Notas */
.notes-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
.note-item {
  background: #FFFDF8; border: 1px solid #EAE0C9; border-radius: 10px;
  padding: 12px 14px; margin-bottom: 8px;
}
.note-top { display: flex; justify-content: space-between; align-items: center; }
.note-date { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: #8A7A5E; }
.note-text { font-size: 14px; margin-top: 4px; }
.note-text.done { text-decoration: line-through; color: #8A7A5E; }
.check-btn { width: 20px; height: 20px; border-radius: 5px; border: 1.5px solid #2A2118; background: transparent; cursor: pointer; flex-shrink: 0; }
.check-btn.checked { background: #2E6B63; border-color: #2E6B63; }
.note-row { display: flex; gap: 10px; align-items: flex-start; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="eyebrow">Bazar 69</div>
    <h1 class="title">Panel del bazar</h1>
  </div>

  <div class="lock-bar">
    <button class="lock-btn" id="lockBtn">🔒 Modo edición</button>
  </div>

  <div class="error-banner" id="errorBanner"></div>
  <div class="saving-tag" id="savingTag">Guardando…</div>

  <div class="nav-tabs">
    <button class="nav-tab active" data-section="inventario">Inventario</button>
    <button class="nav-tab" data-section="bitacora">Bitácora</button>
    <button class="nav-tab" data-section="chat">Chat</button>
    <button class="nav-tab" data-section="notas">Notas</button>
  </div>

  <!-- INVENTARIO -->
  <div class="section active" id="section-inventario">
    <div class="totals">
      <div class="totals-label">Total esperado en existencias</div>
      <div class="totals-value" id="totalGeneral">$0</div>
      <div class="totals-split">
        <span><span class="dot" style="background:#C1587A"></span>Mayra: <span id="totalMayra">$0</span></span>
        <span><span class="dot" style="background:#2E6B63"></span>Papá: <span id="totalPapa">$0</span></span>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-filter="todos">Disponibles</button>
      <button class="tab" data-filter="mayra">Mayra</button>
      <button class="tab" data-filter="papa">Papá</button>
      <button class="tab" data-filter="vendidos">Vendidos</button>
    </div>

    <button class="add-btn" id="addBtn">+ Agregar producto</button>

    <form class="form-card" id="formCard">
      <div class="field">
        <label>Producto</label>
        <input type="text" id="fName" placeholder="Ej. Silla de madera tallada" required />
      </div>
      <div class="field">
        <label>Precio de lista</label>
        <input type="number" id="fPrice" placeholder="Ej. 450" min="0" required />
      </div>
      <div class="field">
        <label>Pertenece a</label>
        <div class="owner-pick">
          <div class="owner-opt sel-mayra" id="ownerMayra" data-owner="mayra">Mayra</div>
          <div class="owner-opt" id="ownerPapa" data-owner="papa">Papá</div>
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-ghost" id="cancelBtn">Cancelar</button>
        <button type="submit" class="btn-primary">Guardar producto</button>
      </div>
    </form>

    <div id="list"></div>

    <div class="footer-note">
      Usa el código (ej. B69-0001) como nombre de carpeta para guardar la foto del producto.
    </div>
  </div>

  <!-- BITACORA -->
  <div class="section" id="section-bitacora">
    <div class="horario-card">
      <div class="horario-fijo">Horario de atención: <strong>Lun–Sáb, 12:00 PM – 5:00 PM</strong></div>
      <div id="statusPill"></div>
      <div class="bitacora-actions">
        <button class="btn-abrir" id="btnAbrir">Marcar apertura</button>
        <button class="btn-cerrar" id="btnCerrar">Marcar cierre</button>
      </div>
    </div>
    <div id="logList"></div>
  </div>

  <!-- CHAT -->
  <div class="section" id="section-chat">
    <div class="whoami" id="whoami">
      <div class="who-opt" data-who="Sebas">Sebas</div>
      <div class="who-opt" data-who="Mayra">Mayra</div>
      <div class="who-opt" data-who="Papá">Papá</div>
    </div>
    <div class="chat-list" id="chatList"></div>
    <div class="chat-input-row">
      <input type="text" id="chatInput" placeholder="Escribe un mensaje…" />
      <button class="chat-send" id="chatSend">Enviar</button>
    </div>
  </div>

  <!-- NOTAS -->
  <div class="section" id="section-notas">
    <div class="notes-tabs">
      <button class="tab active" data-notetab="notas">Notas</button>
      <button class="tab" data-notetab="actividades">Actividades del día</button>
    </div>
    <button class="add-btn" id="addNoteBtn">+ Agregar</button>
    <form class="form-card" id="noteForm">
      <div class="field">
        <label id="noteFieldLabel">Nota</label>
        <textarea id="noteText" placeholder="Escribe aquí…" required></textarea>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-ghost" id="noteCancelBtn">Cancelar</button>
        <button type="submit" class="btn-primary">Guardar</button>
      </div>
    </form>
    <div id="notesList"></div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCiTmM7G8bW7k_yDB8G90JWhoQjN6BQWTk",
  authDomain: "bazar69-inventario.firebaseapp.com",
  databaseURL: "https://bazar69-inventario-default-rtdb.firebaseio.com/",
  projectId: "bazar69-inventario",
  storageBucket: "bazar69-inventario.firebasestorage.app",
  messagingSenderId: "730883515964",
  appId: "1:730883515964:web:e32982282cbfede14e4539"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const productsRef = db.ref('productos');
const bitacoraRef = db.ref('bitacora');
const chatRef = db.ref('chat');
const notasRef = db.ref('notas');

// ---------- ADMIN PIN ----------
// Cambia este PIN por el que quieras usando el editor de GitHub.
const ADMIN_PIN = "6927";
let isAdmin = sessionStorage.getItem('bazar69admin') === '1';

function updateLockUI() {
  const btn = document.getElementById('lockBtn');
  btn.textContent = isAdmin ? "🔓 Modo edición activo" : "🔒 Modo edición";
  btn.classList.toggle('unlocked', isAdmin);
  document.querySelectorAll('[data-admin-only]').forEach(el => {
    el.style.display = isAdmin ? '' : 'none';
  });
  document.getElementById('addBtn').style.display = isAdmin ? 'block' : 'none';
  document.getElementById('addNoteBtn').style.display = isAdmin ? 'block' : 'none';
  document.getElementById('btnAbrir').style.display = isAdmin ? 'block' : 'none';
  document.getElementById('btnCerrar').style.display = isAdmin ? 'block' : 'none';
  document.querySelector('.chat-input-row').style.display = isAdmin ? 'flex' : 'none';
  document.getElementById('whoami').style.display = isAdmin ? 'flex' : 'none';
  render();
  renderBitacora();
  renderChat();
  renderNotes();
}

document.getElementById('lockBtn').addEventListener('click', () => {
  if (isAdmin) {
    isAdmin = false;
    sessionStorage.removeItem('bazar69admin');
    updateLockUI();
    return;
  }
  const pin = prompt("PIN de edición:");
  if (pin === ADMIN_PIN) {
    isAdmin = true;
    sessionStorage.setItem('bazar69admin', '1');
    updateLockUI();
  } else if (pin !== null) {
    alert("PIN incorrecto.");
  }
});

// ---------- NAV ----------
document.querySelectorAll('.nav-tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(`section-${t.dataset.section}`).classList.add('active');
  });
});

function formatMoney(n) {
  const v = Number(n) || 0;
  return v.toLocaleString("es-MX", { style: "currency", currency: "MXN", maximumFractionDigits: 0 });
}
function todayStr() {
  return new Date().toLocaleDateString("es-MX", { day: "2-digit", month: "short", year: "numeric" });
}
function todayKey() {
  const d = new Date();
  return d.toISOString().slice(0,10);
}
function nowTime() {
  return new Date().toLocaleTimeString("es-MX", { hour: '2-digit', minute:'2-digit' });
}
function showError(msg) {
  const el = document.getElementById('errorBanner');
  if (!msg) { el.classList.remove('show'); return; }
  el.textContent = msg;
  el.classList.add('show');
}
function showSaving(on) {
  document.getElementById('savingTag').classList.toggle('show', on);
}
function requireAdmin() {
  if (!isAdmin) {
    alert("Desbloquea el modo edición (🔒 arriba) para hacer cambios.");
    return false;
  }
  return true;
}

// ---------- INVENTARIO ----------
let products = {};
let filter = "todos";
let selectedOwner = "mayra";

function nextCode() {
  let max = 0;
  Object.values(products).forEach(p => {
    const m = /B69-(\d+)/.exec(p.codigo);
    if (m) max = Math.max(max, parseInt(m[1], 10));
  });
  return `B69-${String(max + 1).padStart(4, "0")}`;
}

productsRef.on('value', (snap) => {
  products = snap.val() || {};
  render();
}, () => showError("No se pudo conectar con la base de datos."));

function render() {
  const list = Object.values(products);
  const disponibles = list.filter(p => p.estado === "disponible");
  const vendidos = list.filter(p => p.estado === "vendido");

  const totalMayra = disponibles.filter(p => p.dueno === "mayra").reduce((s,p) => s + p.precio_lista, 0);
  const totalPapa = disponibles.filter(p => p.dueno === "papa").reduce((s,p) => s + p.precio_lista, 0);

  document.getElementById('totalGeneral').textContent = formatMoney(totalMayra + totalPapa);
  document.getElementById('totalMayra').textContent = formatMoney(totalMayra);
  document.getElementById('totalPapa').textContent = formatMoney(totalPapa);

  let vis
